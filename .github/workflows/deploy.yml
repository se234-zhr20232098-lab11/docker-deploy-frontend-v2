name: Deploy frontend application

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          echo "$DOCKER_HUB_TOKEN" | docker login --username "$DOCKER_HUB_USERNAME" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/234-deploylab-frontend:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/234-deploylab-frontend:latest

      - name: Save Docker image
        run: docker save ${{ secrets.DOCKER_HUB_USERNAME }}/234-deploylab-frontend:latest -o frontend-image.tar

      - name: Copy image to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: root
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: 2222
          source: "frontend-image.tar"
          target: "/root/frontend"

      - name: Run frontend container
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: root
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            docker load -i /root/frontend/frontend-image.tar
            docker rm -f lab11-frontend || true
            docker run -d --name lab11-frontend --restart unless-stopped --network host ${{ secrets.DOCKER_HUB_USERNAME }}/234-deploylab-frontend:latest
            rm -rf /root/frontend
